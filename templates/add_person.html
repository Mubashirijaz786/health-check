{% extends 'base.html' %}

{% block content %}
<div class="animate-fade-in" style="max-width: 600px; margin: 0 auto;">
    <div style="margin-bottom: 4rem; text-align: center;">
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Add New <span style="color: var(--primary);">Patient</span></h1>
        <p style="color: var(--text-secondary);">Enter the name of the patient to start tracking.</p>
    </div>

    <form id="patientForm" class="glass-card" style="padding: 3rem;">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 3rem;">
            <label class="form-label">Patient Name</label>
            <input type="text" id="p_name" required placeholder="Enter full name" class="input-premium">
        </div>

        <button type="button" onclick="savePatient()" id="saveBtn" class="btn-premium btn-primary" style="width: 100%; height: 55px; border-radius: 12px;">
            SAVE PATIENT
        </button>
        <a href="{% url 'index' %}" style="display: block; text-align: center; margin-top: 1.5rem; color: var(--text-dim); text-decoration: none; font-weight: 700;">CANCEL</a>
    </form>
</div>

<script>
    async function savePatient() {
        const n = document.getElementById('p_name').value;
        if (!n) return alert("Please enter a name");
        
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerText = 'SAVING...';
        
        await fetch("{% url 'add_person' %}", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify({ person_name: n, medicines: [] })
        });
        window.location.href = "{% url 'index' %}";
    }
</script>
{% endblock %}
