{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health System | Smart Care</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 4rem; padding-left: 0.5rem;">
                <div
                    style="width: 40px; height: 40px; border-radius: 10px; background: #2563eb; display: flex; align-items: center; justify-content: center; color: white;">
                    <i data-lucide="heart"></i>
                </div>
                <span style="font-family: 'Outfit'; font-size: 1.4rem; font-weight: 500; color: white;">HEALTH <span
                        style="color: #2563eb;">SYSTEM</span></span>
            </div>

            <nav style="flex: 1;">
                <p
                    style="color: var(--text-dim); font-size: 0.7rem; font-weight: 500; text-transform: uppercase; margin: 2rem 0 1rem 1rem;">
                    Menu</p>
                <a href="{% url 'index' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}">
                    <i data-lucide="timer"></i> <span class="nav-label">Medicine Timer</span>
                </a>
                <a href="{% url 'analysis_hub' %}"
                    class="nav-link {% if 'checkers/' in request.path or request.resolver_match.url_name == 'analysis_hub' %}active{% endif %}">
                    <i data-lucide="activity"></i> <span class="nav-label">Health Checkers</span>
                </a>
                <a href="{% url 'hospital_finder' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'hospital_finder' %}active{% endif %}">
                    <i data-lucide="search"></i> <span class="nav-label">Find Hospital</span>
                </a>
            </nav>


        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-container">

                <div class="animate-fade-in">
                    {% if messages %}
                    <div style="margin-bottom: 2rem;">
                        {% for message in messages %}
                        <div
                            style="padding: 1rem; border-radius: 8px; margin-bottom: 1rem; 
                                    {% if message.tags == 'error' %}background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2);
                                    {% else %}background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2);{% endif %}">
                            {{ message }}
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}

                    {% block content %}{% endblock %}
                </div>
            </div>
        </main>
    </div>

    <!-- Medicine Alert Modal -->
    <div id="auraAlertModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(20px); z-index:10000; align-items:center; justify-content:center;">
        <div class="glass-card"
            style="max-width:400px; width:90%; padding:3rem; text-align:center; border: 1px solid var(--primary);">
            <div
                style="width: 80px; height: 80px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 2.5rem; animation: pulse 1.5s infinite;">
                <i data-lucide="bell" style="width: 40px; height: 40px;"></i>
            </div>
            <h2 style="font-size: 2rem; margin-bottom: 1rem; color: white; font-weight: 500;">Medicine Reminder</h2>
            <div id="auraAlertContent"
                style="color:var(--text-secondary); margin-bottom:3rem; font-size: 1.1rem; line-height: 1.6;"></div>
            <button onclick="closeAuraAlert()" class="btn-premium btn-primary"
                style="width:100%; height: 60px; font-size: 1rem; border-radius: 12px; font-weight: 500;">OK,
                DONE</button>
        </div>
    </div>

    <audio id="auraAlertSound" src="{% static 'beep.mp3' %}" preload="auto" loop></audio>

    <script>
        lucide.createIcons();
        function updateClock() {
            const now = new Date();
            const el = document.getElementById('auraClock');
            if (el) el.textContent = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000); updateClock();

        let activeAlerts = new Set();

        // Unlock audio on the first interaction (click or keypress) anywhere on the page
        function unlockAudio() {
            const sound = document.getElementById('auraAlertSound');
            sound.play().then(() => {
                sound.pause();
                sound.currentTime = 0;
                document.removeEventListener('click', unlockAudio);
                document.removeEventListener('keydown', unlockAudio);
            }).catch(e => console.log("Audio unlock failed:", e));
        }
        document.addEventListener('click', unlockAudio);
        document.addEventListener('keydown', unlockAudio);

        function triggerAuraAlert(messages) {
            const modal = document.getElementById('auraAlertModal');
            const sound = document.getElementById('auraAlertSound');

            // Build a combined message for multiple patients
            let combinedMsg = messages.join('<div style="margin: 1.5rem 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>');
            document.getElementById('auraAlertContent').innerHTML = combinedMsg;
            modal.style.display = 'flex';

            // Play the reminder sound immediately
            sound.play().catch(e => console.log("Sound autoplay blocked by browser policy.", e));
        }

        function closeAuraAlert() {
            const modal = document.getElementById('auraAlertModal');
            const sound = document.getElementById('auraAlertSound');
            modal.style.display = 'none';
            sound.pause();
            sound.currentTime = 0;
        }

        window.medicineData = [];
        async function syncMedicineData() {
            try {
                const res = await fetch('/api/medicine_data/');
                const data = await res.json();
                window.medicineData = data.persons;
            } catch (e) { console.log("Sync Error", e); }
        }
        syncMedicineData();
        setInterval(syncMedicineData, 30000);

        function checkReminders() {
            if (window.medicineData) {
                const now = new Date();
                const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                let newMatches = [];

                window.medicineData.forEach(person => {
                    person.medicines.forEach(med => {
                        med.times.forEach(time => {
                            let formattedTime = time;
                            if (time.length === 4) formattedTime = "0" + time;

                            const alertKey = `${person.name}-${med.name}-${formattedTime}-${now.toDateString()}`;
                            if (formattedTime === currentTime && !activeAlerts.has(alertKey)) {
                                newMatches.push(`Patient: <b style="color:white; font-weight:500;">${person.name}</b><br>Medicine: <b style="color:var(--primary); font-weight:500;">${med.name}</b>`);
                                activeAlerts.add(alertKey);
                            }
                        });
                    });
                });

                if (newMatches.length > 0) {
                    triggerAuraAlert(newMatches);
                }
            }
        }

        // Check every 10 seconds
        setInterval(checkReminders, 10000);
    </script>
</body>

</html>
