{% extends 'base.html' %}

{% block content %}
<div class="animate-in" style="max-width: 800px; margin: 0 auto;">
    <div style="margin-bottom: 4rem; text-align: center;">
        <h1 style="font-size: 3rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 1rem;">Symptom Checker</h1>
        <p style="color: var(--text-muted); font-size: 1.2rem; font-weight: 500;">Answer a few questions for an AI health assessment.</p>
    </div>

    <div class="card" style="padding: 4rem;">
        <form method="POST">
            {% csrf_token %}
            <div style="display: grid; grid-template-columns: 1fr; gap: 3rem;">
                
                <div class="form-group">
                    <label style="font-size: 1.2rem; font-weight: 800; margin-bottom: 1.5rem; display: block;">What is your body temperature?</label>
                    <div style="position: relative;">
                        <input type="number" step="0.1" name="temperature" required placeholder="98.6" style="height: 72px; padding-left: 2rem; font-size: 1.5rem; font-weight: 800; border-width: 3px;">
                        <span style="position: absolute; right: 2rem; top: 50%; transform: translateY(-50%); font-weight: 800; color: var(--primary); font-size: 1.2rem;">°F</span>
                    </div>
                </div>

                <div>
                    <label style="font-size: 1.2rem; font-weight: 800; margin-bottom: 1.5rem; display: block;">Are you experiencing any of these?</label>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.25rem;">
                        {% for sym, label in symptom_list %}
                            <label class="card" style="padding: 1.5rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; border-radius: 20px; transition: 0.2s;">
                                <input type="checkbox" name="symptoms" value="{{ sym }}" style="width: 24px; height: 24px; accent-color: var(--primary);">
                                <span style="font-weight: 700;">{{ label }}</span>
                            </label>
                        {% endfor %}
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="height: 72px; justify-content: center; font-size: 1.25rem; border-radius: 20px; margin-top: 1rem;">
                    Analyze My Health
                </button>
            </div>
        </form>

        {% if result %}
            <div class="animate-in" style="margin-top: 5rem; padding-top: 4rem; border-top: 2px dashed var(--border);">
                <div style="text-align: center; margin-bottom: 3rem;">
                    <div class="badge badge-primary" style="margin-bottom: 1.5rem; padding: 0.6rem 1.5rem; font-size: 0.85rem;">Analysis Complete</div>
                    <h2 style="font-size: 2.5rem; font-weight: 800; color: {% if risk_level == 'High' %}var(--danger){% elif risk_level == 'Medium' %}#F59E0B{% else %}var(--primary){% endif %}; letter-spacing: -0.03em;">
                        {{ risk_level }} Risk Level
                    </h2>
                </div>

                <div class="card" style="background: var(--bg-body); border: none; text-align: center; padding: 3rem; border-radius: 32px;">
                    <p style="font-size: 1.3rem; line-height: 1.7; font-weight: 500; color: var(--text-main);">
                        {{ result }}
                    </p>
                </div>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
