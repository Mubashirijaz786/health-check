{% extends 'base.html' %}

{% block content %}
<div class="animate-in" style="max-width: 600px; margin: 0 auto;">
    <div style="margin-bottom: 3rem;">
        <h1 style="font-size: 2.25rem; font-weight: 800; margin-bottom: 0.5rem;">Edit Medication</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem; font-weight: 500;">Modifying schedule for <strong>{{ person.name }}</strong></p>
    </div>

    <div class="card" style="padding: 2.5rem;">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Medicine Name</label>
                <input type="text" name="name" value="{{ medicine.name }}" required>
            </div>
            
            <div class="form-group">
                <label>Dosage</label>
                <input type="text" name="dosage" value="{{ medicine.dosage }}" required>
            </div>

            <div class="form-group">
                <label>Duration (Days)</label>
                <input type="number" name="total_days" value="{{ medicine.total_days }}" required>
            </div>

            <div class="form-group">
                <label>Reminder Times</label>
                <div id="tCont" style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
                    {% for t in medicine.times %}
                        <div style="display: flex; align-items: center; gap: 0.25rem; background: var(--bg-body); padding: 0.5rem; border-radius: 10px; border: 1px solid var(--border);">
                            <input type="time" name="time_{{ forloop.index0 }}" value="{{ t }}" required style="border: none; background: none; width: auto; font-weight: 700;">
                            <button type="button" onclick="this.parentElement.remove()" style="background: none; border: none; color: var(--danger); cursor: pointer;"><i data-lucide="minus-circle" style="width: 16px;"></i></button>
                        </div>
                    {% endfor %}
                </div>
                <button type="button" onclick="addT()" class="btn btn-outline" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">
                    <i data-lucide="plus"></i> Add Another Time
                </button>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 3rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2; justify-content: center; height: 56px;">Save Changes</button>
                <a href="{% url 'index' %}" class="btn btn-outline" style="flex: 1; justify-content: center; height: 56px;">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    let tIdx = {{ medicine.times|length }};
    function addT() {
        const div = document.createElement('div');
        div.style = "display: flex; align-items: center; gap: 0.25rem; background: var(--bg-body); padding: 0.5rem; border-radius: 10px; border: 1px solid var(--border);";
        div.innerHTML = `
            <input type="time" name="time_${tIdx++}" required style="border: none; background: none; width: auto; font-weight: 700;">
            <button type="button" onclick="this.parentElement.remove()" style="background: none; border: none; color: var(--danger); cursor: pointer;"><i data-lucide="minus-circle" style="width: 16px;"></i></button>
        `;
        document.getElementById('tCont').appendChild(div);
        lucide.createIcons();
    }
</script>
{% endblock %}
