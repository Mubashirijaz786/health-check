{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>Edit Medicine for {{ person.name }}</h2>
    
    <form action="{{ url_for('edit_medicine', person_id=person.id, medicine_id=medicine.id) }}" method="POST">
        <div class="form-group">
            <label for="name">Medicine Name:</label>
            <input type="text" id="name" name="name" value="{{ medicine.name }}" required>
        </div>
        
        <div class="form-group">
            <label for="dosage">Dosage:</label>
            <input type="text" id="dosage" name="dosage" value="{{ medicine.dosage }}" required>
        </div>
        
        <div class="form-group">
            <label for="total_days">Total Days to Use:</label>
            <input type="number" id="total_days" name="total_days" value="{{ medicine.total_days }}" required min="1">
        </div>
        
        <div class="form-group">
            <label>Reminder Times:</label>
            <div id="times_container" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;">
                {% for t in medicine.times %}
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <input type="time" name="time_{{ loop.index0 }}" value="{{ t }}" required style="width: auto;">
                        <button type="button" onclick="this.parentElement.remove()" style="background:#e74c3c; padding:5px 10px; border-radius:4px;">X</button>
                    </div>
                {% endfor %}
            </div>
            <button type="button" onclick="addTime()" style="background:#3498db; font-size:0.8rem; padding:6px 12px;">+ Add Another Time</button>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" style="background:#2ecc71;">Save Changes</button>
            <a href="{{ url_for('index') }}" class="btn-edit" style="background: #95a5a6; padding: 12px 20px;">Cancel</a>
        </div>
    </form>
</div>

<script>
let timeCount = {{ medicine.times|length }};
function addTime() {
    const container = document.getElementById('times_container');
    const div = document.createElement('div');
    div.style = "display: flex; align-items: center; gap: 5px;";
    div.innerHTML = `
        <input type="time" name="time_${timeCount}" required style="width: auto;">
        <button type="button" onclick="this.parentElement.remove()" style="background:#e74c3c; padding:5px 10px; border-radius:4px;">X</button>
    `;
    container.appendChild(div);
    timeCount++;
}
</script>
{% endblock %}
