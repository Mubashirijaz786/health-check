{% extends 'base.html' %}

{% block content %}
<div class="animate-fade-in" style="max-width: 600px; margin: 0 auto;">
    <div style="margin-bottom: 4rem; text-align: center;">
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Add <span style="color: var(--primary);">Medicine</span></h1>
        <p style="color: var(--text-secondary);">Add a new medicine for <b>{{ person.name }}</b>.</p>
    </div>

    <form method="POST" class="glass-card" style="padding: 3rem;">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Medicine Name</label>
            <input type="text" name="name" required placeholder="e.g. Panadol" class="input-premium">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem;">
            <div class="form-group">
                <label class="form-label">Dose (e.g. 500mg)</label>
                <input type="text" name="dosage" required placeholder="500mg" class="input-premium">
            </div>
            <div class="form-group">
                <label class="form-label">Days (Total)</label>
                <input type="number" name="total_days" required value="7" class="input-premium">
            </div>
        </div>

        <div class="form-group" style="margin-top: 2.5rem;">
            <label class="form-label">Reminder Times</label>
            <div id="timeStream" style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="time" name="time_1" required class="input-premium" style="width: auto;">
            </div>
            <button type="button" onclick="addTime()" style="background:none; border:none; color:var(--primary); font-weight:800; margin-top:1.5rem; cursor:pointer; font-size:0.8rem;">+ ADD ANOTHER TIME</button>
        </div>

        <button type="submit" class="btn-premium btn-primary" style="width: 100%; height: 55px; border-radius: 12px; margin-top: 3rem;">
            SAVE MEDICINE
        </button>
        <a href="{% url 'index' %}" style="display: block; text-align: center; margin-top: 1.5rem; color: var(--text-dim); text-decoration: none; font-weight: 700;">CANCEL</a>
    </form>
</div>

<script>
    let tCount = 1;
    function addTime() {
        tCount++;
        const i = document.createElement('input');
        i.type = 'time'; i.name = 'time_' + tCount; i.className = 'input-premium';
        i.style = "width: auto; margin-top: 0.5rem;";
        document.getElementById('timeStream').appendChild(i);
    }
</script>
{% endblock %}
