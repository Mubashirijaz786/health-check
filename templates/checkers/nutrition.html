{% extends 'checkers/checker_base.html' %}

{% block checker_fields %}
{% with title="Nutrition Intelligence" description="Identify potential vitamin and mineral deficiencies from physical symptoms." %}

<div class="form-group">
    <label class="form-label">Primary Diet Type</label>
    <select name="diet" class="input-premium" style="background: rgba(0,0,0,0.25); appearance: none;">
        <option value="balanced">Balanced / Everything</option>
        <option value="vegan">Vegan / Plant-Based</option>
        <option value="vegetarian">Vegetarian</option>
        <option value="keto">Keto / High-Fat</option>
    </select>
</div>

<div class="form-group">
    <label class="form-label">Physical Indicators</label>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="scissors" style="width: 20px; color: var(--danger);"></i>
                <span style="font-weight: 700; color: white;">Hair Loss</span>
            </div>
            <input type="checkbox" name="hair_fall" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
        
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="battery-low" style="width: 20px; color: var(--warning);"></i>
                <span style="font-weight: 700; color: white;">Persistent Fatigue</span>
            </div>
            <input type="checkbox" name="fatigue" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>

        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="sun" style="width: 20px; color: var(--accent);"></i>
                <span style="font-weight: 700; color: white;">Pale Skin</span>
            </div>
            <input type="checkbox" name="pale_skin" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
    </div>
</div>

{% endwith %}
{% endblock %}
