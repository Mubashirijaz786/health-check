{% extends 'checkers/checker_base.html' %}

{% block checker_fields %}
{% with title="Respiratory Intelligence" description="Viral risk assessment for COVID-19 and Influenza variants." %}

<div class="form-group">
    <label class="form-label">Oxygen Saturation (SpO2)</label>
    <div style="position: relative;">
        <input type="number" name="oxygen" required class="input-premium" placeholder="e.g. 98">
        <span style="position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%); font-weight: 800; color: var(--primary); font-size: 0.8rem;">%</span>
    </div>
</div>

<div class="form-group">
    <label class="form-label">Symptom Checklist</label>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="thermometer" style="width: 20px; color: var(--danger);"></i>
                <span style="font-weight: 700; color: white;">High Fever</span>
            </div>
            <input type="checkbox" name="fever" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
        
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="wind" style="width: 20px; color: var(--accent);"></i>
                <span style="font-weight: 700; color: white;">Dry Cough</span>
            </div>
            <input type="checkbox" name="cough" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>

        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="nose" style="width: 20px; color: var(--warning);"></i>
                <span style="font-weight: 700; color: white;">Loss of Smell/Taste</span>
            </div>
            <input type="checkbox" name="smell_loss" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
    </div>
</div>

{% endwith %}
{% endblock %}
