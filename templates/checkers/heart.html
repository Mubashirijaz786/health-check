{% extends 'checkers/checker_base.html' %}

{% block checker_fields %}
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
    <div class="form-group">
        <label class="form-label">Patient Age</label>
        <input type="number" name="age" required class="input-premium" placeholder="e.g. 45">
    </div>
    <div class="form-group">
        <label class="form-label">Systolic BP</label>
        <input type="number" name="systolic" required class="input-premium" placeholder="e.g. 120">
    </div>
</div>

<div class="form-group">
    <label class="form-label">Pre-existing Indicators</label>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="cigarette" style="width: 20px; color: var(--danger);"></i>
                <span style="font-weight: 700; color: white;">Active Smoker</span>
            </div>
            <input type="checkbox" name="smoking" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
        
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="droplet" style="width: 20px; color: var(--success);"></i>
                <span style="font-weight: 700; color: white;">Diabetes Diagnosis</span>
            </div>
            <input type="checkbox" name="diabetes" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>

        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="flame" style="width: 20px; color: var(--warning);"></i>
                <span style="font-weight: 700; color: white;">Frequent Chest Pain</span>
            </div>
            <input type="checkbox" name="chest_pain" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
    </div>
</div>
{% endblock %}
