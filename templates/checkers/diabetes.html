{% extends 'checkers/checker_base.html' %}

{% block checker_fields %}
<div class="form-group">
    <label class="form-label">Serum Glucose (mg/dL)</label>
    <div style="position: relative;">
        <i data-lucide="droplet" style="position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--primary); width: 20px;"></i>
        <input type="number" name="glucose" required class="input-premium" placeholder="e.g. 105" style="padding-left: 4rem;">
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
    <div class="form-group">
        <label class="form-label">Body Mass Index</label>
        <input type="number" step="0.1" name="bmi" required class="input-premium" placeholder="e.g. 24.5">
    </div>
    <div class="form-group">
        <label class="form-label">Age</label>
        <input type="number" name="age" required class="input-premium" placeholder="e.g. 40">
    </div>
</div>

<div class="form-group">
    <label class="form-label">Risk Profile</label>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="history" style="width: 20px; color: var(--primary);"></i>
                <span style="font-weight: 700; color: white;">Family History</span>
            </div>
            <input type="checkbox" name="family_history" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
        
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="waves" style="width: 20px; color: var(--accent);"></i>
                <span style="font-weight: 700; color: white;">Frequent Thirst</span>
            </div>
            <input type="checkbox" name="frequent_thirst" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
    </div>
</div>
{% endblock %}
