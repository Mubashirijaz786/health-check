{% extends 'base.html' %}

{% block content %}
<div class="animate-in" style="max-width: 800px; margin: 0 auto;">
    <div style="margin-bottom: 4rem; text-align: center;">
        <h1 style="font-size: 3rem; margin-bottom: 1rem;"><span class="gradient-text">Blood Sugar Tracker</span></h1>
        <p style="color: var(--text-body); font-size: 1.2rem;">Monitor glucose levels and pre-diabetes indicators.</p>
    </div>

    <div class="glass-card" style="padding: 4rem;">
        <form method="POST">
            {% csrf_token %}
            <div style="display: grid; grid-template-columns: 1fr; gap: 2.5rem; margin-bottom: 3.5rem;">
                <div class="form-group">
                    <label style="font-size: 1.1rem; font-weight: 800; color: white; margin-bottom: 1rem; display: block;">Glucose Level (mg/dL)</label>
                    <div style="position: relative;">
                        <input type="number" step="0.1" name="sugar_value" required placeholder="100" class="form-input" style="height: 64px; font-size: 1.3rem;">
                        <span style="position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--primary); font-weight: 800;">mg/dL</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label style="font-size: 1.1rem; font-weight: 800; color: white; margin-bottom: 1rem; display: block;">Test Type</label>
                    <div style="display: flex; gap: 1rem;">
                        <label class="glass-card" style="flex: 1; padding: 1rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                            <input type="radio" name="meal_type" value="fasting" checked style="accent-color: var(--primary);">
                            <span style="color: white; font-weight: 600;">Fasting</span>
                        </label>
                        <label class="glass-card" style="flex: 1; padding: 1rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                            <input type="radio" name="meal_type" value="after_meal" style="accent-color: var(--primary);">
                            <span style="color: white; font-weight: 600;">After Meal</span>
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 72px; justify-content: center; font-size: 1.25rem;">
                Analyze Glucose Data
            </button>
        </form>

        {% if result %}
            <div class="animate-in" style="margin-top: 5rem; padding-top: 4rem; border-top: 1px solid var(--border);">
                <div style="text-align: center; margin-bottom: 3rem;">
                    <div class="badge" style="margin-bottom: 1.5rem;">Glucose Status</div>
                    <h2 style="font-size: 2.5rem; color: {% if status == 'Normal' %}var(--secondary){% elif status == 'Low' %}#38BDF8{% else %}var(--accent){% endif %};">
                        {{ status }}
                    </h2>
                </div>
                <div class="glass-card" style="background: rgba(255,255,255,0.03); text-align: center; padding: 3rem;">
                    <p style="font-size: 1.3rem; line-height: 1.7; color: white;">{{ result }}</p>
                </div>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
