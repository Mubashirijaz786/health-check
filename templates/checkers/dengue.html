{% extends 'checkers/checker_base.html' %}

{% block checker_fields %}
<div class="form-group">
    <label class="form-label">Platelet Count (per μL)</label>
    <div style="position: relative;">
        <i data-lucide="layers" style="position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--warning); width: 20px;"></i>
        <input type="number" name="platelets" required class="input-premium" placeholder="e.g. 150000" style="padding-left: 4rem;">
    </div>
</div>

<div class="form-group">
    <label class="form-label">Critical Warning Signs</label>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="thermometer" style="width: 20px; color: var(--danger);"></i>
                <span style="font-weight: 700; color: white;">High Grade Fever</span>
            </div>
            <input type="checkbox" name="fever" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
        
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="droplet-off" style="width: 20px; color: var(--danger);"></i>
                <span style="font-weight: 700; color: white;">Active Bleeding</span>
            </div>
            <input type="checkbox" name="bleeding" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>

        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="zap" style="width: 20px; color: var(--warning);"></i>
                <span style="font-weight: 700; color: white;">Severe Joint Pain</span>
            </div>
            <input type="checkbox" name="joint_pain" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
    </div>
</div>
{% endblock %}
