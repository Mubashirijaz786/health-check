{% extends 'checkers/checker_base.html' %}

{% block checker_fields %}
{% with title="Fever Tracker" description="Symptomatic analysis for high-temperature viral and bacterial indicators." %}

<div class="form-group">
    <label class="form-label">Body Temperature (°F)</label>
    <div style="position: relative;">
        <input type="number" step="0.1" name="temperature" required class="input-premium" placeholder="e.g. 98.6">
        <span style="position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%); font-weight: 800; color: var(--primary); font-size: 0.8rem;">°F</span>
    </div>
</div>

<div class="form-group">
    <label class="form-label">Associated Symptoms</label>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="brain" style="width: 20px; color: var(--primary);"></i>
                <span style="font-weight: 700; color: white;">Severe Headache</span>
            </div>
            <input type="checkbox" name="symptoms" value="headache" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
        
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="battery-low" style="width: 20px; color: var(--warning);"></i>
                <span style="font-weight: 700; color: white;">Extreme Fatigue</span>
            </div>
            <input type="checkbox" name="symptoms" value="fatigue" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>

        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="wind" style="width: 20px; color: var(--accent);"></i>
                <span style="font-weight: 700; color: white;">Persistent Cough</span>
            </div>
            <input type="checkbox" name="symptoms" value="cough" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
    </div>
</div>

{% endwith %}
{% endblock %}
