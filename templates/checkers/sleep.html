{% extends 'checkers/checker_base.html' %}

{% block checker_fields %}
{% with title="Sleep Quality" description="Analysis of sleep patterns and detection of potential sleep disorders." %}

<div class="form-group">
    <label class="form-label">Sleep Duration (Hours)</label>
    <div style="position: relative;">
        <input type="number" name="hours" required class="input-premium" placeholder="e.g. 7" value="8">
        <span style="position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%); font-weight: 800; color: var(--primary); font-size: 0.8rem;">HRS</span>
    </div>
</div>

<div class="form-group">
    <label class="form-label">Circadian Indicators</label>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="volume-2" style="width: 20px; color: var(--danger);"></i>
                <span style="font-weight: 700; color: white;">Loud Snoring</span>
            </div>
            <input type="checkbox" name="snoring" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>
        
        <label class="glass-card" style="padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="battery-warning" style="width: 20px; color: var(--warning);"></i>
                <span style="font-weight: 700; color: white;">Daytime Tiredness</span>
            </div>
            <input type="checkbox" name="tiredness" value="yes" style="accent-color: var(--primary); width: 20px; height: 20px;">
        </label>

        <div class="form-group" style="margin-top: 1rem;">
            <label class="form-label">Nightly Interruptions</label>
            <input type="number" name="interruptions" class="input-premium" placeholder="e.g. 0" value="0">
        </div>
    </div>
</div>

{% endwith %}
{% endblock %}
